<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Activate Vendor Billing</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
    }

    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 14px;
      padding: 36px 40px;
      width: 440px;
    }

    .app-name {
      font-size: 22px;
      font-weight: 700;
      color: #60a5fa;
      margin-bottom: 4px;
      letter-spacing: -0.3px;
    }

    .subtitle {
      font-size: 13px;
      color: #64748b;
      margin-bottom: 32px;
    }

    label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 7px;
    }

    .machine-id-box {
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 7px;
      padding: 10px 14px;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      color: #7dd3fc;
      word-break: break-all;
      line-height: 1.5;
      cursor: text;
      user-select: all;
    }

    .hint {
      font-size: 11px;
      color: #475569;
      margin-top: 6px;
      margin-bottom: 24px;
    }

    textarea {
      width: 100%;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 7px;
      padding: 10px 14px;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      color: #e2e8f0;
      resize: none;
      height: 88px;
      outline: none;
      transition: border-color 0.15s;
      line-height: 1.5;
    }

    textarea:focus { border-color: #3b82f6; }
    textarea::placeholder { color: #334155; }

    button {
      width: 100%;
      margin-top: 14px;
      padding: 11px;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 7px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      letter-spacing: 0.01em;
    }

    button:hover:not(:disabled) { background: #1d4ed8; }
    button:disabled { background: #1e3a5f; color: #475569; cursor: not-allowed; }

    .msg {
      margin-top: 12px;
      padding: 10px 14px;
      border-radius: 7px;
      font-size: 12.5px;
      line-height: 1.4;
      display: none;
    }

    .msg.error  { display: block; background: #450a0a; border: 1px solid #7f1d1d; color: #fca5a5; }
    .msg.success { display: block; background: #052e16; border: 1px solid #14532d; color: #86efac; }
  </style>
</head>
<body>
  <div class="card">
    <div class="app-name">Vendor Billing</div>
    <div class="subtitle">Software Activation</div>

    <label>Your Machine ID</label>
    <div class="machine-id-box" id="machineId">Loading…</div>
    <div class="hint">Send this ID to the developer to receive your license key.</div>

    <label>License Key</label>
    <textarea id="licenseKey" placeholder="Paste your license key here…"></textarea>

    <button id="activateBtn" onclick="activate()">Activate</button>
    <div class="msg" id="msg"></div>
  </div>

  <script>
    window.addEventListener('DOMContentLoaded', async () => {
      const id = await window.electronAPI.getMachineId()
      document.getElementById('machineId').textContent = id
    })

    async function activate() {
      const key = document.getElementById('licenseKey').value.trim()
      const btn = document.getElementById('activateBtn')
      const msg = document.getElementById('msg')

      if (!key) { showMsg('Please paste your license key.', 'error'); return }

      btn.disabled = true
      btn.textContent = 'Activating…'
      msg.className = 'msg'

      const result = await window.electronAPI.activateLicense(key)

      if (result.success) {
        showMsg('✓ License activated! Starting the app…', 'success')
      } else {
        showMsg(result.error || 'Invalid license key.', 'error')
        btn.disabled = false
        btn.textContent = 'Activate'
      }
    }

    function showMsg(text, type) {
      const msg = document.getElementById('msg')
      msg.textContent = text
      msg.className = 'msg ' + type
    }
  </script>
</body>
</html>
